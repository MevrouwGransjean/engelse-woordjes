<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Woordjes leren</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --green: #86efac;
      --orange: #fdba74;
      --grey: #d1d5db;
      --border: #e5e7eb;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #fdf2f8);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(900px, 100%);
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3rem);
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }

    .menu {
      display: grid;
      gap: 18px;
      max-width: 520px;
      margin: 0 auto;
    }

    label {
      font-weight: 700;
      display: block;
      margin-bottom: 8px;
    }

    select, input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 1rem;
      background: white;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: white;
      transition: 0.15s ease;
    }

    button:hover { background: var(--primary-dark); transform: translateY(-1px); }
    button.secondary { background: #111827; }
    button.secondary:hover { background: #374151; }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
      color: var(--muted);
      font-weight: 700;
    }

    .topbar span {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
    }

    .hint {
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      font-weight: 800;
      text-align: center;
      margin: 16px 0 8px;
    }

    .helper {
      color: var(--muted);
      text-align: center;
      margin-bottom: 18px;
    }

    .grid-wrap {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .grid {
      display: grid;
      gap: 8px;
      justify-content: center;
      margin-bottom: 8px;
    }

    .tile {
      width: 46px;
      height: 46px;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 900;
      background: white;
      text-transform: uppercase;
    }

    .tile.green { background: var(--green); border-color: #22c55e; }
    .tile.orange { background: var(--orange); border-color: #f97316; }
    .tile.grey { background: var(--grey); border-color: #9ca3af; }
    .tile.space { background: #f3f4f6; border-style: dashed; color: transparent; }

    .answer-row {
      max-width: 460px;
      margin: 18px auto 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .message {
      min-height: 28px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      margin-top: 14px;
    }

    .danger { color: var(--danger); }
    .success { color: #15803d; }

    footer {
      text-align: center;
      color: var(--muted);
      margin-top: 24px;
      font-size: 0.9rem;
    }

    @media (max-width: 560px) {
      body { padding: 12px; }
      .card { padding: 18px; border-radius: 18px; }
      .button-row, .answer-row { grid-template-columns: 1fr; }
      .tile { width: 38px; height: 38px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Woordjes leren</h1>
      <p class="subtitle">Kies een Mixed Bag en oefen Engels ↔ Nederlands.</p>
    </header>

    <section id="startscherm" class="card menu">
      <div>
        <label for="levelSelect">Mixed Bag</label>
        <select id="levelSelect"></select>
      </div>

      <div>
        <label>Spelmodus</label>
        <select id="modeSelect">
          <option value="normal">Rustig oefenen zonder timer</option>
          <option value="speed">Speed Mode - 60 seconden</option>
        </select>
      </div>

      <div>
        <label>Oefenrichting</label>
        <div class="button-row">
          <button onclick="startWithMode('en-nl')">Engels → Nederlands</button>
          <button onclick="startWithMode('nl-en')">Nederlands → Engels</button>
        </div>
      </div>
    </section>

    <section id="spel" class="card" style="display:none;">
      <div class="topbar">
        <span id="timer">⏱ 60s</span>
        <span id="levelLabel">Mixed Bag</span>
        <span id="score">Score: 0</span>
        <span id="xp">XP: 0</span>
        <span id="streak">🔥 Streak: 0</span>
        <span id="highscore">🏆 Record: 0</span>
        <button class="secondary" onclick="terugNaarMenu()">Terug naar menu</button>
      </div>

      <div id="hint" class="hint"></div>
      <div id="helper" class="helper"></div>
      <div id="grid-container" class="grid-wrap"></div>

      <div class="answer-row">
        <input type="text" id="guess" placeholder="Typ je antwoord" autocomplete="off" />
        <button onclick="submitGuess()">OK</button>
      </div>

      <p id="remaining" class="helper"></p>
      <p id="message" class="message"></p>
    </section>

    <footer>
      Spel ontwikkeld door Mevrouw Gransjean<br />© april 2026
    </footer>
  </main>

    let score = 0;
    let woorden = [];
    let correctLetters = [];
    let secret = [];
    let target = "";
    let hint = "";
    let wordLength = 0;
    let turn = 0;
    let mode = "en-nl";
    let currentLevel = "77";
    let xp = 0;
    let streak = 0;
    let gameActive = false;
    let isChecking = false;
    let timeLeft = 60;
    let timerInterval = null;
    let isSpeedMode = false;
    let highscore = Number(localStorage.getItem("woordjesHighscore")) || 0;

    const levelSelect = document.getElementById("levelSelect");
    const modeSelect = document.getElementById("modeSelect");
    Object.keys(woordenPerLevel).forEach(level => {
      const option = document.createElement("option");
      option.value = level;
      option.textContent = `Mixed Bag ${level}`;
      levelSelect.appendChild(option);
    });

    function clean(text) {
      return text.toLowerCase().trim().replaceAll(" ", "");
    }

    function startWithMode(selectedMode) {
      mode = selectedMode;
      currentLevel = levelSelect.value;
      woorden = woordenPerLevel[currentLevel];

      score = 0;
      xp = 0;
      streak = 0;
      gameActive = true;
      isChecking = false;
      isSpeedMode = modeSelect.value === "speed";

      document.getElementById("score").textContent = "Score: 0";
      document.getElementById("xp").textContent = "XP: 0";
      document.getElementById("streak").textContent = "🔥 Streak: 0";
      document.getElementById("highscore").textContent = isSpeedMode ? `🏆 Record: ${highscore}` : "🏆 Vrij oefenen";
      document.getElementById("timer").textContent = isSpeedMode ? "⏱ 60s" : "⏱ Geen timer";
      document.getElementById("levelLabel").textContent = `Mixed Bag ${currentLevel}`;
      document.getElementById("startscherm").style.display = "none";
      document.getElementById("spel").style.display = "block";

      startGame();
      if (isSpeedMode) {
        startTimer();
      } else if (timerInterval) {
        clearInterval(timerInterval);
      }
    }

    function terugNaarMenu() {
      gameActive = false;
      isChecking = false;
      if (timerInterval) clearInterval(timerInterval);

      document.getElementById("spel").style.display = "none";
      document.getElementById("startscherm").style.display = "grid";
    }

    function startGame() {
      if (!gameActive) return;

      const woord = woorden[Math.floor(Math.random() * woorden.length)];

      if (mode === "en-nl") {
        secret = woord.nederlands.toLowerCase().split(",").map(s => s.trim());
        hint = woord.engels;
      } else {
        secret = woord.engels.toLowerCase().split(",").map(s => s.trim());
        hint = woord.nederlands;
      }

      target = secret[0];
      wordLength = target.length;
      turn = 0;
      correctLetters = Array(wordLength).fill(null);

      document.getElementById("grid-container").innerHTML = "";
      document.getElementById("message").textContent = "";
      document.getElementById("message").className = "message";
      document.getElementById("hint").textContent = `Hint: ${hint}`;
      document.getElementById("helper").textContent = `${wordLength} tekens, spaties tellen mee maar mogen ook worden overgeslagen bij het invullen.`;
      document.getElementById("remaining").textContent = `Nog ${wordLength} tekens invoeren…`;

      for (let i = 0; i < 6; i++) {
        const row = document.createElement("div");
        row.classList.add("grid");
        row.style.gridTemplateColumns = `repeat(${wordLength}, 46px)`;

        for (let j = 0; j < wordLength; j++) {
          const tile = document.createElement("div");
          tile.classList.add("tile");
          tile.id = `tile-${i}-${j}`;

          if (target[j] === " ") {
            tile.textContent = " ";
            tile.classList.add("space");
            correctLetters[j] = " ";
          }

          row.appendChild(tile);
        }
        document.getElementById("grid-container").appendChild(row);
      }

      const input = document.getElementById("guess");
      input.setAttribute("maxlength", wordLength);
      input.value = "";
      input.disabled = false;
      isChecking = false;
      input.focus();
    }

    function submitGuess() {
      if (!gameActive) return;

      const input = document.getElementById("guess");
      const guess = input.value.toLowerCase();
      const message = document.getElementById("message");

      if (guess.length !== wordLength) {
        input.disabled = false;
        isChecking = false;
        message.textContent = `Gebruik precies ${wordLength} tekens. Spaties tellen mee.`;
        message.className = "message danger";
        return;
      }

      if (turn >= 6) return;

      for (let i = 0; i < wordLength; i++) {
        const tile = document.getElementById(`tile-${turn}-${i}`);

        if (target[i] === " ") {
          tile.textContent = " ";
          tile.classList.add("space");
          continue;
        }

        tile.textContent = guess[i].toUpperCase();

        if (guess[i] === target[i]) {
          tile.classList.add("green");
          correctLetters[i] = guess[i];
        } else if (target.includes(guess[i])) {
          tile.classList.add("orange");
        } else {
          tile.classList.add("grey");
        }
      }

      if (secret.some(answer => clean(answer) === clean(guess))) {
        score++;
        xp += 10;
        streak++;

        let bonusText = "";
        if (streak === 3) bonusText = " 🔥 3 op rij!";
        if (streak === 5) bonusText = " 🚀 5 op rij!";
        if (streak === 10) bonusText = " 👑 10 op rij!";

        message.textContent = `✅ Goed geraden! +10 XP${bonusText}`;
        message.className = "message success";

        document.getElementById("score").textContent = `Score: ${score}`;
        document.getElementById("xp").textContent = `XP: ${xp}`;
        document.getElementById("streak").textContent = `🔥 Streak: ${streak}`;

        setTimeout(() => { if (gameActive) startGame(); }, 1600);
        return;
      }

      turn++;

      if (turn === 6) {
        streak = 0;
        document.getElementById("streak").textContent = "🔥 Streak: 0";

        message.textContent = `❌ Helaas! Antwoord: ${secret.map(w => w.toUpperCase()).join(" of ")}`;
        message.className = "message danger";
        setTimeout(() => { if (gameActive) startGame(); }, 3000);
        return;
      }

      for (let i = 0; i < wordLength; i++) {
        if (correctLetters[i]) {
          const tile = document.getElementById(`tile-${turn}-${i}`);
          tile.textContent = correctLetters[i].toUpperCase();
          tile.classList.add(correctLetters[i] === " " ? "space" : "green");
        }
      }

      input.value = "";
      input.disabled = false;
      isChecking = false;
      input.focus();

      document.getElementById("remaining").textContent =
        `Nog ${wordLength} tekens invoeren…`;
    }

    const input = document.getElementById("guess");
    input.addEventListener("keydown", event => {
      if (event.key === "Enter") submitGuess();
    });

    input.addEventListener("input", () => {
      if (!gameActive || isChecking) return;

      const entered = input.value.length;
      const rest = wordLength - entered;

      document.getElementById("remaining").textContent =
        rest === 0
          ? "⏳ Controleren..."
          : `Nog ${rest} teken${rest === 1 ? "" : "s"} invoeren…`;

      if (entered === wordLength && turn < 6) {
        isChecking = true;
        input.disabled = true;

        setTimeout(() => {
          submitGuess();
        }, 200);
      }
    });

    function startTimer() {
      timeLeft = 60;
      document.getElementById("timer").textContent = `⏱ ${timeLeft}s`;

      if (timerInterval) clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").textContent = `⏱ ${timeLeft}s`;

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      gameActive = false;
      isChecking = false;

      const input = document.getElementById("guess");
      input.disabled = true;

      let endMessage = `⏰ Tijd voorbij! Score: ${score}`;

      if (score > highscore) {
        highscore = score;
        localStorage.setItem("woordjesHighscore", highscore);
        document.getElementById("highscore").textContent = `🏆 Record: ${highscore}`;
        endMessage = `🏆 NIEUW RECORD! Score: ${score}`;
      }

      document.getElementById("remaining").textContent = "Speel opnieuw via het menu.";
      document.getElementById("message").textContent = endMessage;
      document.getElementById("message").className = "message success";
    }
