  let correctLetters = [];
  let secret = "";
  let hint = "";
  let wordLength = 0;
  let turn = 0;
  let mode = "en-nl";

  function startWithMode(selectedMode) {
    mode = selectedMode;
    document.getElementById("startscherm").style.display = "none";
    document.getElementById("spel").style.display = "block";
    startGame();
  }

  function startGame() {
    const woord = woorden[Math.floor(Math.random() * woorden.length)];
    if (mode === "en-nl") {
      secret = woord.nederlands.toLowerCase().split(',').map(s => s.trim());
      hint = woord.engels;
    } else {
      secret = woord.engels.toLowerCase().split(',').map(s => s.trim());
      hint = woord.nederlands;
    }

    let target = secret[0];
    wordLength = target.length;
    turn = 0;
    correctLetters = Array(wordLength).fill(null);

    document.getElementById("grid-container").innerHTML = "";
    document.getElementById("message").textContent = "";
    document.getElementById("hint").textContent = `Hint: ${hint} (${wordLength} letters)`;
    document.getElementById("remaining").textContent = `Nog ${wordLength} letters invoeren…`;

    for (let i = 0; i < 6; i++) {
      const row = document.createElement("div");
      row.classList.add("grid");
      row.style.gridTemplateColumns = `repeat(${wordLength}, 50px)`;

      for (let j = 0; j < wordLength; j++) {
        const tile = document.createElement("div");
        tile.classList.add("tile");
        tile.id = `tile-${i}-${j}`;

        if (target[j] === " ") {
          tile.textContent = " ";
          tile.style.backgroundColor = "#eee";
          tile.style.border = "2px dashed #ccc";
          correctLetters[j] = " ";
        }

        row.appendChild(tile);
      }

      document.getElementById("grid-container").appendChild(row);
    }

    const input = document.getElementById("guess");
    input.setAttribute("maxlength", wordLength);
    input.value = "";
    input.focus();
  }

  function submitGuess() {
    const input = document.getElementById("guess");
    const guess = input.value.toLowerCase();

    if (guess.length !== wordLength) {
      document.getElementById("message").textContent = `Gebruik precies ${wordLength} letters.`;
      return;
    }
    if (turn >= 6) return;

    let target = secret[0];

    for (let i = 0; i < wordLength; i++) {
      const tile = document.getElementById(`tile-${turn}-${i}`);
      if (target[i] === " ") {
        tile.textContent = " ";
        tile.style.backgroundColor = "#eee";
        tile.style.border = "2px dashed #ccc";
        continue;
      }

      tile.textContent = guess[i].toUpperCase();

      if (guess[i] === target[i]) {
        tile.classList.add("green");
        correctLetters[i] = guess[i];
      } else if (target.includes(guess[i])) {
        tile.classList.add("orange");
      } else {
        tile.classList.add("grey");
      }
    }

    if (secret.some(w => w.replaceAll(" ", "") === guess.replaceAll(" ", ""))) {
      document.getElementById("message").textContent = "✅ Goed geraden!";
      score++;
      document.getElementById("score").textContent = `Score: ${score}`;
      setTimeout(startGame, 2000);
      return;
    }

    turn++;
    if (turn === 6) {
      document.getElementById("message").textContent = `❌ Helaas! Mogelijke antwoorden: ${secret.map(w => w.toUpperCase()).join(' of ')}`;
      setTimeout(startGame, 3000);
      return;
    }

    for (let i = 0; i < wordLength; i++) {
      if (correctLetters[i]) {
        const tile = document.getElementById(`tile-${turn}-${i}`);
        tile.textContent = correctLetters[i].toUpperCase();
        tile.classList.add("green");
      }
    }

    input.value = "";
    input.focus();
  }

  const input = document.getElementById("guess");
  input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      submitGuess();
    }
  });

  input.addEventListener("input", () => {
    const entered = input.value.length;
    const rest = wordLength - entered;
    const over = entered > wordLength;

    const msg = over
      ? `❌ Te veel letters (max. ${wordLength})`
      : rest === 0
        ? `✅ Klaar om te verzenden (druk op Enter)`
        : `Nog ${rest} letter${rest === 1 ? '' : 's'} invoeren…`;

    document.getElementById("remaining").textContent = msg;

    if (over) {
      input.style.border = "2px solid red";
      input.style.backgroundColor = "#ffe5e5";
    } else {
      input.style.border = "2px solid #ccc";
      input.style.backgroundColor = "white";
    }
  });
